services:
  # NestJS Backend
  - type: web
    name: vietmy-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: node dist/main
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false   # Set manually in Render dashboard (from Neon)
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false   # Set to your Vercel URL after deploying frontend
      - key: DB_SYNC
        value: "true"
      - key: TWO_FA_APP_NAME
        value: VietMyCallCenter
